source = ~/.config/hypr/conf.d/monitors.conf

$mainMod = SUPER
$terminal = ghostty
$fileManager = thunar
$menu = ~/nixos/scripts/bin/rofi-launcher drun -show-icons
$browser = vivaldi --remote-debugging-port=9222
$editor = cursor

general {
  gaps_in = 4
  gaps_out = 8
  border_size = 1
  col.active_border = rgba(c7bfffee) rgba(5b4ebcee) 45deg
  col.inactive_border = rgba(474552aa)
  resize_on_border = false
  allow_tearing = false
  layout = dwindle
}

decoration {
  rounding = 22
  active_opacity = 1.0
  inactive_opacity = 1.0

  blur {
    enabled = true
    size = 3
    passes = 1
    vibrancy = 0.1696
  }
}

animations {
  enabled = true
  bezier = myBezier, 0.05, 0.9, 0.1, 1.05
  animation = windows, 1, 5, myBezier
  animation = windowsOut, 1, 5, default, popin 80%
  animation = border, 1, 8, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 5, default
  animation = workspaces, 1, 4, default
}

dwindle {
  pseudotile = true
  preserve_split = true
}

master {
  new_status = master
}

misc {
  disable_hyprland_logo = true
  on_focus_under_fullscreen = 2
  enable_swallow = true
  mouse_move_focuses_monitor = true
  mouse_move_enables_dpms = true
  force_default_wallpaper = 0
}

input {
  kb_layout = us,bg
  kb_options = grp:alt_shift_toggle
  kb_variant = ,phonetic
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = false
  }
}

gesture = 3, left, workspace, +1
gesture = 3, right, workspace, -1
gesture = 3, up, fullscreen
gesture = 3, down, close
gesture = 4, up, float
gesture = 4, down, move
gesture = 4, left, resize
gesture = 4, right, resize
gesture = 3, up, mod: SUPER, special, magic

device {
  name = epic-mouse-v1
  sensitivity = -0.5
}

bind = $mainMod, SPACE, exec, env WEBKIT_DISABLE_DMABUF_RENDERER=1 flare
bind = $mainMod, P, exec, $menu
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, F, togglefloating
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, W, exec, ~/nixos/scripts/bin/workspace-switcher swap
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, W, movewindow, mon:+1
bind = $mainMod Alt, H, resizeactive, -60 0
bind = $mainMod Alt, L, resizeactive, 60 0
bind = $mainMod, LEFT, moveactive, -60 0
bind = $mainMod, UP, moveactive, 0 -60
bind = $mainMod, DOWN, moveactive, 0 60
bind = $mainMod, RIGHT, moveactive, 60 0
bind = $mainMod, A, exec, $browser
bind = $mainMod, C, exec, cursor
bind = $mainMod, D, exec, discord
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, exec, $editor
bind = $mainMod, y, exec, $browser https://youtube.com
bind = $mainMod, g, exec, $browser https://github.com
bind = $mainMod, h, exec, ~/nixos/scripts/bin/cliphist
bind = $mainMod SHIFT, X, exec, ~/nixos/scripts/bin/screenshot
bind = $mainMod, Z, exec, hyprpicker
bind = $mainMod, B, exec, ~/nixos/scripts/wallpaper/waypaper.sh
bind = $mainMod SHIFT, B, exec, waypaper
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, L, exit,
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, ESCAPE, exec, ~/nixos/scripts/bin/powermenu
bind = $mainMod SHIFT, R, exec, pkill waybar && waybar &
bind = $mainMod SHIFT, T, exec, killall -SIGUSR1 waybar
bind = $mainMod ALT, T, exec, killall -SIGUSR1 waybar
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioNext, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
bind = , XF86AudioPrev, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
bindr = , 123, exec, pactl set-sink-volume @DEFAULT_SINK@ +1%
bindr = , 122, exec, pactl set-sink-volume @DEFAULT_SINK@ -1%
bindr = , 276, exec, pactl set-sink-volume @DEFAULT_SINK@ +1%
bindr = , 277, exec, pactl set-sink-volume @DEFAULT_SINK@ -1%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle && notify-send "Audio" "$(pactl get-sink-mute @DEFAULT_SINK@ | grep -q 'yes' && echo '🔇 Muted' || echo '🔊 Unmuted')" -h string:x-canonical-private-synchronous:audio-status
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle && notify-send "Microphone" "$(pactl get-source-mute @DEFAULT_SOURCE@ | grep -q 'yes' && echo '🎤 Muted' || echo '🎤 Unmuted')" -h string:x-canonical-private-synchronous:mic-status
bind = , XF86MonitorBrightnessUp, exec, light -A 5 && notify-send "Brightness: $(light -G | cut -d'.' -f1)%"
bind = , XF86MonitorBrightnessDown, exec, light -U 5 && notify-send "Brightness: $(light -G | cut -d'.' -f1)%"
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86Eject, exec, notify-send "Eject pressed"
bind = , XF86Calculator, exec, gnome-calculator
bind = , XF86HomePage, exec, $browser
bind = , XF86Mail, exec, notify-send "Mail key pressed"
bind = , Print, exec, ~/nixos/scripts/bin/screenshot
bind = , XF86ScreenSaver, exec, loginctl lock-session
bind = , XF86Sleep, exec, systemctl suspend
bind = , XF86TouchpadToggle, exec, notify-send "Touchpad toggle pressed"
bind = , XF86TouchpadOn, exec, notify-send "Touchpad enabled"
bind = , XF86TouchpadOff, exec, notify-send "Touchpad disabled"
bind = , XF86Display, exec, notify-send "Display key pressed"
bind = $mainMod, M, exec, hyprctl dispatch dpms off && notify-send "Monitors" "🔴 Turned off" -h string:x-canonical-private-synchronous:monitor-status
bind = $mainMod SHIFT, M, exec, hyprctl dispatch dpms on && notify-send "Monitors" "🟢 Turned on" -h string:x-canonical-private-synchronous:monitor-status
bind = $mainMod CTRL, M, exec, ~/nixos/scripts/bin/monitor-control toggle
bind = $mainMod CTRL, A, exec, ~/nixos/scripts/bin/audio-sink-selector
bind = , XF86Battery, exec, notify-send "Battery key pressed"
bind = , XF86Search, exec, $browser https://www.google.com
bindl = , switch:on:Lid Switch, exec, ~/nixos/scripts/bin/lid-handler close
bindl = , switch:off:Lid Switch, exec, ~/nixos/scripts/bin/lid-handler open

windowrule = match:title ^(UnityEngine.*), min_size 200 400, float on
windowrule = match:title ^(UnityEditor.*), min_size 200 400, float on
windowrule = match:class ^(ghostty)$, float on
windowrule = match:class ^(dev.warp.Warp)$, float on
windowrule = match:title ^(File Operation Progress)$, float on
windowrule = match:class ^(discord)$, workspace 1
windowrule = match:class ^(dev.zed.Zed)$, workspace 2
windowrule = match:class ^(cursor)$, workspace 2
windowrule = match:class ^(Vivaldi-stable)$, workspace 3
windowrule = match:class ^(com\.gabm\.satty)$, float on
windowrule = match:class .*, suppress_event maximize

exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /home/fractal-tess/nixos/scripts/wallpaper/wallpaper.sh restore
exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec-once = wl-paste --watch cliphist store
exec-once = blueman-applet
exec-once = nm-applet
exec-once = hypridle
exec-once = swaync
exec-once = waybar
exec-once = env WEBKIT_DISABLE_DMABUF_RENDERER=1 flare
exec-once = handy
