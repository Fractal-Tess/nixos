#############
### INPUT ###
#############

input {
  kb_layout = us,bg
  kb_options = grp:alt_shift_toggle
  kb_variant = ,phonetic
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = false
  }
}

gesture = 3, horizontal, workspace
gesture = 4, up, float

device {
  name = epic-mouse-v1
  sensitivity = -0.5
}
