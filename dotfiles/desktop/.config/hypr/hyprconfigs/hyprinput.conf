#############
### INPUT ###
#############

input {
  kb_layout = us,bg
  kb_options = grp:alt_shift_toggle
  kb_variant = ,phonetic
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = false
  }
}

gestures {
  workspace_swipe = true
  workspace_swipe_fingers = 3
  workspace_swipe_distance = 300
  workspace_swipe_invert = false
  workspace_swipe_cancel_ratio = 0.5
}

device {
  name = epic-mouse-v1
  sensitivity = -0.5
}
