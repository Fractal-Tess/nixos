###################
### KEYBINDINGS ###
###################


bind = $mainMod, P, exec, $menu
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, F, togglefloating
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod, W, exec, ~/nixos/scripts/bin/workspace-switcher swap
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, W, movewindow, mon:+1
bind = $mainMod Alt, H, resizeactive, -60 0
bind = $mainMod Alt, L, resizeactive, 60 0
bind = $mainMod, LEFT, moveactive, -60 0
bind = $mainMod, UP, moveactive, 0 -60
bind = $mainMod, DOWN, moveactive, 0 60
bind = $mainMod, RIGHT, moveactive, 60 0
bind = $mainMod, A, exec, $browser
bind = $mainMod, C, exec, zeditor
bind = $mainMod, D, exec, discord
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, exec, $editor
bind = $mainMod, y, exec, $browser https://youtube.com
bind = $mainMod, g, exec, $browser https://github.com
bind = $mainMod, h, exec, ~/.config/RofiScripts/Clipboard/Clipboard.sh
bind = $mainMod SHIFT, X, exec, ~/nixos/scripts/bin/screenshot
bind = $mainMod, Z, exec, hyprpicker
bind = $mainMod, B, exec, ~/.config/RofiScripts/WallpaperChanger/WallMenu.sh
bind = $mainMod SHIFT, B, exec, waypaper
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, L, exit,
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, ESCAPE, exec, ~/nixos/scripts/bin/powermenu
bind = $mainMod SHIFT, R, exec, pkill waybar && waybar &
bind = $mainMod SHIFT, T, exec, killall -SIGUSR1 waybar
bind = $mainMod ALT, T, exec, killall -SIGUSR1 waybar
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindr = , 123, exec, pactl set-sink-volume @DEFAULT_SINK@ +1%
bindr = , 122, exec, pactl set-sink-volume @DEFAULT_SINK@ -1%
bindr = , 276, exec, pactl set-sink-volume @DEFAULT_SINK@ +1%
bindr = , 277, exec, pactl set-sink-volume @DEFAULT_SINK@ -1%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle && notify-send "Audio" "$(pactl get-sink-mute @DEFAULT_SINK@ | grep -q 'yes' && echo '🔇 Muted' || echo '🔊 Unmuted')" -h string:x-canonical-private-synchronous:audio-status
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle && notify-send "Microphone" "$(pactl get-source-mute @DEFAULT_SOURCE@ | grep -q 'yes' && echo '🎤 Muted' || echo '🎤 Unmuted')" -h string:x-canonical-private-synchronous:mic-status
bind = , XF86MonitorBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bind = , XF86MonitorBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86Calculator, exec, ~/.config/RofiScripts/RofiCalc/Calc.sh
bind = , XF86HomePage, exec, $browser
bind = , Print, exec, ~/nixos/scripts/bin/screenshot
bind = , XF86ScreenSaver, exec, loginctl lock-session
bind = , XF86Sleep, exec, systemctl suspend
bind = $mainMod, M, exec, hyprctl dispatch dpms off && notify-send "Monitors" "Turned off" -h string:x-canonical-private-synchronous:monitor-status
bind = $mainMod SHIFT, M, exec, hyprctl dispatch dpms on && notify-send "Monitors" "Turned on" -h string:x-canonical-private-synchronous:monitor-status
bind = $mainMod CTRL, M, exec, ~/nixos/scripts/bin/monitor-control toggle
bind = $mainMod CTRL, A, exec, ~/nixos/scripts/bin/audio-sink-selector
bind = , XF86Search, exec, $browser https://www.google.com
bindl = , switch:on:Lid Switch, exec, ~/nixos/scripts/bin/lid-handler close
bindl = , switch:off:Lid Switch, exec, ~/nixos/scripts/bin/lid-handler open
